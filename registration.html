<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symposium Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <h1>TECHFEST 2026</h1>
        <h2>Symposium Registration Form</h2>

        <form>

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Mobile Number</label>
                <input type="tel" placeholder="Enter your mobile number" required>
            </div>

            <div class="input-box">
                <label>College Name</label>
                <input type="text" placeholder="Enter your college name" required>
            </div>

            <div class="input-box">
                <label>Department</label>
                <select required>
                    <option value="">Select Department</option>
                    <option>CSE</option>
                    <option>IT</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>MECH</option>
                    <option>CIVIL</option>
                </select>
            </div>

            <div class="input-box">
                <label>Year of Study</label>
                <select required>
                    <option value="">Select Year</option>
                    <option>I Year</option>
                    <option>II Year</option>
                    <option>III Year</option>
                    <option>IV Year</option>
                </select>
            </div>

            <div class="input-box">
                <label>Gender</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender"> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                    <label><input type="radio" name="gender"> Other</label>
                </div>
            </div>

            <div class="input-box">
                <label>Select Event</label>
                <select required>
                    <option value="">Choose an Event</option>
                    <option>Paper Presentation</option>
                    <option>Project Expo</option>
                    <option>Debugging</option>
                    <option>Web Designing</option>
                    <option>Quiz</option>
                    <option>Poster Presentation</option>
                </select>
            </div>

            <div class="input-box">
                <label>Upload Abstract / Resume</label>
                <input type="file">
            </div>

            <div class="input-box">
                <label>Additional Remarks</label>
                <textarea rows="4" placeholder="Enter your remarks"></textarea>
            </div>

            <button type="submit">Register Now</button>

        </form>
    </div>
</div>

</body>
</html>
